version: 0.0
os: linux
files:
  - source: /
    destination: /opt/contrato-ia/deploy

hooks:
  BeforeInstall:
    - location: scripts/codedeploy/before-install.sh
      timeout: 60
      runas: root

  AfterInstall:
    - location: scripts/codedeploy/after-install.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/codedeploy/application-start.sh
      timeout: 120
      runas: root

  ValidateService:
    - location: scripts/codedeploy/validate-service.sh
      timeout: 120
      runas: root
