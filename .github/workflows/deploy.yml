name: Deploy - Backend

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: 'Docker image tag (default: latest)'
        required: false
        default: 'latest'

permissions:
  contents: read

env:
  AWS_REGION: sa-east-1
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DEPLOY_BUCKET: contrato-ia-deploy-artifacts
  CODEDEPLOY_APP_STAGING: contrato-ia-staging-backend
  CODEDEPLOY_APP_PRODUCTION: contrato-ia-production-backend
  CODEDEPLOY_GROUP_STAGING: contrato-ia-staging-backend-dg
  CODEDEPLOY_GROUP_PRODUCTION: contrato-ia-production-backend-dg

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine deployment config
        id: config
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "codedeploy_app=${{ env.CODEDEPLOY_APP_PRODUCTION }}" >> $GITHUB_OUTPUT
            echo "deployment_group=${{ env.CODEDEPLOY_GROUP_PRODUCTION }}" >> $GITHUB_OUTPUT
          else
            echo "codedeploy_app=${{ env.CODEDEPLOY_APP_STAGING }}" >> $GITHUB_OUTPUT
            echo "deployment_group=${{ env.CODEDEPLOY_GROUP_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare deployment bundle
        run: |
          # Write the full GHCR image reference for the EC2 to pull
          echo "${{ env.GHCR_IMAGE }}:${{ inputs.image_tag }}" > IMAGE_TAG

          # Create deployment archive with appspec + scripts + IMAGE_TAG
          zip -r deploy-bundle.zip \
            appspec.yml \
            scripts/codedeploy/ \
            IMAGE_TAG

      - name: Upload bundle to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          S3_KEY="${{ inputs.environment }}/${TIMESTAMP}-deploy-bundle.zip"
          aws s3 cp deploy-bundle.zip "s3://${{ env.DEPLOY_BUCKET }}/${S3_KEY}"
          echo "S3_KEY=${S3_KEY}" >> $GITHUB_ENV

      - name: Create CodeDeploy deployment
        id: deploy
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "${{ steps.config.outputs.codedeploy_app }}" \
            --deployment-group-name "${{ steps.config.outputs.deployment_group }}" \
            --s3-location "bucket=${{ env.DEPLOY_BUCKET }},key=${S3_KEY},bundleType=zip" \
            --description "Deploy ${{ inputs.image_tag }} to ${{ inputs.environment }} via GitHub Actions" \
            --query 'deploymentId' --output text)

          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo ">>> Deployment created: $DEPLOYMENT_ID"

      - name: Wait for deployment to complete
        run: |
          echo ">>> Waiting for deployment ${{ steps.deploy.outputs.deployment_id }}..."
          aws deploy wait deployment-successful \
            --deployment-id "${{ steps.deploy.outputs.deployment_id }}"
          echo ">>> Deployment successful!"

      - name: Summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.GHCR_IMAGE }}:${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment ID:** ${{ steps.deploy.outputs.deployment_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CodeDeploy App:** ${{ steps.config.outputs.codedeploy_app }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Group:** ${{ steps.config.outputs.deployment_group }}" >> $GITHUB_STEP_SUMMARY
