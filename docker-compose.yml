version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: contratoai-postgres
    environment:
      POSTGRES_DB: contratoiadb
      POSTGRES_USER: contrato_user
      POSTGRES_PASSWORD: contrato_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contrato_user -d contratoiadb"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: contratoai-keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/contratoiadb
      KC_DB_USERNAME: contrato_user
      KC_DB_PASSWORD: contrato_pass
      KC_HTTP_PORT: 8180
    ports:
      - "8180:8180"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
