spring:
  application:
    name: contrato-ia-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/contratoiadb}
    username: ${DB_USERNAME:contrato_user}
    password: ${DB_PASSWORD:contrato_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway gerencia o schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    oauth2:
      resourceserver:
        jwt:
          # Substitua pela URL do seu realm Keycloak
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/contrato-ia}
          jwk-set-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/contrato-ia}/protocol/openid-connect/certs

server:
  port: 8080
  servlet:
    context-path: /api

# Claude API
claude:
  api:
    key: ${CLAUDE_API_KEY:}
    base-url: https://api.anthropic.com
    model: claude-sonnet-4-6
    max-tokens: 4096

# AWS
aws:
  s3:
    region: ${AWS_REGION:us-east-1}
    bucket: ${AWS_S3_BUCKET:contrato-ia-docs}
    endpoint: ${AWS_S3_ENDPOINT:}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    presigned-url-expiry-hours: ${AWS_S3_PRESIGNED_EXPIRY_HOURS:24}
  sqs:
    region: ${AWS_REGION:us-east-1}
    endpoint: ${AWS_SQS_ENDPOINT:}
    document-generation-queue-url: ${AWS_SQS_GENERATION_QUEUE_URL:}

# Stripe
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  prices:
    pro: ${STRIPE_PRICE_PRO:}
    business: ${STRIPE_PRICE_BUSINESS:}

# Rate Limiting (requests por minuto por usuário)
rate-limit:
  generate: ${RATE_LIMIT_GENERATE:5}
  export: ${RATE_LIMIT_EXPORT:20}
  read: ${RATE_LIMIT_READ:60}

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

logging:
  level:
    br.com.contratoai: INFO
    org.springframework.security: WARN
